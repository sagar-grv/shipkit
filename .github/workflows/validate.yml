# ShipKit — Validate templates and docs
name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-templates:
    name: Validate Templates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      
      - name: Check template files
        run: |
          echo "Checking template files exist..."
          errors=0
          for f in \
            template/docs/AGENTS.md \
            template/docs/LAST_SESSION.md \
            template/github/dependabot.yml \
            template/github/workflows/auto-merge.yml \
            template/github/workflows/ci.yml \
            template/github/workflows/codeql.yml \
            template/github/workflows/health.yml \
            template/gitlab/gitlab-ci.yml \
            template/bitbucket/bitbucket-pipelines.yml \
            template/render.js; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            else
              echo "  ✗ MISSING: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "ERROR: $errors template files missing!"
            exit 1
          fi
          echo "All template files OK"

  check-docs:
    name: Check Docs & Security
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      
      - name: Verify essential files exist
        run: |
          errors=0
          for f in README.md LICENSE SECURITY.md setup.ps1 setup.sh; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            else
              echo "  ✗ MISSING: $f"
              errors=$((errors + 1))
            fi
          done
          [ $errors -eq 0 ] || exit 1

  template-smoke-test:
    name: Template Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: validate-templates
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Link shipkit-pipe locally
        run: npm link

      - name: Create temp project and run shipkit-pipe
        run: |
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          git init
          mkdir -p .github
          echo '{"name":"test-project","scripts":{"lint":"echo ok","test":"echo ok","build":"echo ok"}}' > package.json
          npx shipkit-pipe --dry-run
          npx shipkit-pipe
          echo "--- smoke test: checking generated files ---"
          for f in shipkit.json AGENTS.md LAST_SESSION.md .github/workflows/ci.yml .github/dependabot.yml .github/workflows/codeql.yml; do
            test -f "$f" && echo "✓ $f" || { echo "✗ MISSING: $f"; exit 1; }
          done

      - name: Run shipkit-pipe check
        run: |
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          git init
          echo '{"name":"check-test","scripts":{"test":"echo ok"}}' > package.json
          npx shipkit-pipe
          npx shipkit-pipe check
          echo "--- json check ---"
          JSON_OUTPUT=$(npx shipkit-pipe check --json 2>/dev/null)
          echo "$JSON_OUTPUT" | grep -q '"project": "check-test"' && echo "✓ JSON check works" || { echo "✗ JSON check failed"; echo "$JSON_OUTPUT"; exit 1; }
