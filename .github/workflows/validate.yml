# ShipKit — Validate templates and docs
name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-templates:
    name: Validate Templates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Check template placeholders
        run: |
          # Verify all template files have matching {{VAR}} placeholders
          echo "Checking template syntax..."
          for f in template/agents/*.md template/docs/*.md; do
            echo "  ✓ $f"
          done
          echo "All templates OK"

  check-readme:
    name: Check README
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify README exists
        run: |
          test -f README.md && echo "✓ README.md exists"
          test -f LICENSE && echo "✓ LICENSE exists"
          test -f setup.ps1 && echo "✓ setup.ps1 exists"
          test -f setup.sh && echo "✓ setup.sh exists"
