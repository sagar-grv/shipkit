# ShipKit — Validate templates and docs
name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-templates:
    name: Validate Templates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      
      - name: Check template files
        run: |
          echo "Checking template files exist..."
          errors=0
          for f in \
            template/docs/AGENTS.md \
            template/docs/LAST_SESSION.md \
            template/github/dependabot.yml \
            template/github/workflows/ci.yml \
            template/github/workflows/codeql.yml \
            template/github/workflows/health.yml \
            template/gitlab/gitlab-ci.yml \
            template/bitbucket/bitbucket-pipelines.yml \
            template/render.js; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            else
              echo "  ✗ MISSING: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "ERROR: $errors template files missing!"
            exit 1
          fi
          echo "All template files OK"

  check-readme:
    name: Check README
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      
      - name: Verify README exists
        run: |
          test -f README.md && echo "✓ README.md exists"
          test -f LICENSE && echo "✓ LICENSE exists"
          test -f setup.ps1 && echo "✓ setup.ps1 exists"
          test -f setup.sh && echo "✓ setup.sh exists"
