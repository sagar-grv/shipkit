# CI Pipeline — Only runs steps your project actually has
# Generated by ShipKit (https://github.com/sagar-grv/shipkit)

image: node:{{NODE_VERSION}}

pipelines:
  default:
    - step:
        name: Install
        caches:
          - node
        script:
          - {{INSTALL_COMMAND}}
{% if HAS_LINT %}
    - step:
        name: Lint
        caches:
          - node
        script:
          - {{INSTALL_COMMAND}}
          - {{LINT_COMMAND}}
{% endif %}
{% if HAS_TYPECHECK %}
    - step:
        name: Type Check
        caches:
          - node
        script:
          - {{INSTALL_COMMAND}}
          - {{TYPECHECK_COMMAND}}
{% endif %}
{% if HAS_TEST %}
    - step:
        name: Test
        caches:
          - node
        script:
          - {{INSTALL_COMMAND}}
          - {{TEST_COMMAND}}
{% endif %}
{% if HAS_BUILD %}
    - step:
        name: Build
        caches:
          - node
        script:
          - {{INSTALL_COMMAND}}
          - {{BUILD_COMMAND}}
{% endif %}
