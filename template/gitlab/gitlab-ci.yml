# CI Pipeline — Only runs steps your project actually has
# Generated by ShipKit (https://github.com/sagar-grv/shipkit)

stages:
  - test
  - build

default:
  image: node:{{NODE_VERSION}}
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

install:
  stage: test
  script:
    - {{INSTALL_COMMAND}}
{% if HAS_LINT %}

lint:
  stage: test
  script:
    - {{INSTALL_COMMAND}}
    - {{LINT_COMMAND}}
{% endif %}
{% if HAS_TYPECHECK %}

typecheck:
  stage: test
  script:
    - {{INSTALL_COMMAND}}
    - {{TYPECHECK_COMMAND}}
{% endif %}
{% if HAS_TEST %}

test:
  stage: test
  script:
    - {{INSTALL_COMMAND}}
    - {{TEST_COMMAND}}
{% endif %}
{% if HAS_BUILD %}

build:
  stage: build
  script:
    - {{INSTALL_COMMAND}}
    - {{BUILD_COMMAND}}
  only:
    - main
{% endif %}
