# CI Pipeline — Only runs steps your project actually has
# Generated by ShipKit (https://github.com/sagar-grv/shipkit)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "{{NODE_VERSION}}"
          cache: "{{PACKAGE_MANAGER}}"

      - name: Install dependencies
        run: {{INSTALL_COMMAND}}

      - name: Security audit
        run: {{PACKAGE_MANAGER}} audit --audit-level=high || true
        continue-on-error: true
{% if HAS_LINT %}

      - name: Lint
        run: {{LINT_COMMAND}}
{% endif %}
{% if HAS_TYPECHECK %}

      - name: Type Check
        run: {{TYPECHECK_COMMAND}}
{% endif %}
{% if HAS_TEST %}

      - name: Test
        run: {{TEST_COMMAND}}
{% endif %}
{% if HAS_BUILD %}

      - name: Build
        run: {{BUILD_COMMAND}}
{% endif %}
