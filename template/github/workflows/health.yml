# Health Check — Pings your site every 6 hours, creates an issue if it's down
# Generated by ShipKit (https://github.com/sagar-grv/shipkit)

name: Health Check

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check site
        id: check
        run: |
          URL="{{DEPLOY_URL}}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✓ Site is up (HTTP $STATUS)"
          else
            echo "✗ Site returned HTTP $STATUS"
            exit 1
          fi

      - name: Create issue if down
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-check',
              state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Site is down',
                body: `Health check failed.\n\n**URL:** ${{ steps.check.outputs.url }}\n**Status:** ${{ steps.check.outputs.status }}\n**Time:** ${new Date().toISOString()}\n\nThis issue was created automatically by the health check workflow. It will close when the site is back up.`,
                labels: ['health-check', 'bug']
              });
            }

      - name: Close issue if recovered
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-check',
              state: 'open'
            });
            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✓ Site is back up. Recovered at ${new Date().toISOString()}.`
              });
            }
